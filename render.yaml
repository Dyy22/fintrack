services:
  - type: web
    name: fintrack-backend
    runtime: docker
    rootDir: fintrack-backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
