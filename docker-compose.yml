services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fintrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./fintrack-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fintrack
      DB_USER: fintrack
      DB_PASSWORD: ${DB_PASSWORD:-fintrack}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  web:
    build: ./fintrack-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
